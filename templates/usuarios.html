{% extends "base.html" %}

{% block title %}Perfil — Lumina AI{% endblock %}

{% block body %}

<section class="profile-stats-section">
  <div class="profile-header">
    <div class="profile-avatar">{{ usuario[1][0].upper() }}</div>
    <div class="profile-info">
      <h2>{{ usuario[1] }}</h2>
      <p class="profile-email">{{ usuario[2] }}</p>
    </div>
  </div>

  <div class="profile-stats">
    <div class="stat-card">
      <p class="stat-label">Total de conversas</p>
      <p class="stat-value">{{ total_conversas }}</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Status</p>
      <p class="stat-online">
        <span class="online-dot"></span>
        Online
      </p>
    </div>
  </div>
</section>

<section>
  <h2>Ações da conta</h2>
  <div class="profile-actions">

    <a href="{{ url_for('chat') }}">
      <button>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Voltar ao Chat
      </button>
    </a>

    <a href="{{ url_for('limpar_conversa') }}">
      <button class="btn-secondary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
        Limpar Conversas
      </button>
    </a>

    <a href="{{ url_for('logout') }}">
      <button class="btn-danger">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </a>

  </div>
</section>

{% endblock %}
